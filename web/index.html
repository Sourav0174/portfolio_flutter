<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="A new Flutter project." />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="portfolio" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>portfolio</title>
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <style>
      body {
        margin: 0;
        background: linear-gradient(135deg, #ff8a00, #6a5ae0);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: Arial, sans-serif;
      }

      .glass-loader {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 30px 40px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        text-align: center;
        color: white;
        box-shadow: 0 0 40px rgba(255, 138, 0, 0.25);
        animation: fadeIn 0.6s ease;
      }

      .spinner {
        width: 42px;
        height: 42px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top: 3px solid white;
        border-radius: 50%;
        margin: 0 auto 20px;
        animation: spin 1s linear infinite;
      }

      .title {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .subtitle {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 6px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>

    <!-- 🔥 Your Loader -->
    <div id="loader" class="glass-loader">
      <div class="spinner"></div>
      <!-- <div class="title">Sourav</div> -->
      <div class="subtitle">Crafting Scalable Experiences...</div>
    </div>

    <!-- Flutter App -->
    <!-- <script src="flutter_bootstrap.js" async></script> -->

    <!-- 🔥 Remove loader when Flutter is ready -->
    <script>
      window.addEventListener("flutter-first-frame", function () {
        const loader = document.getElementById("loader");
        if (loader) {
          loader.style.opacity = "0";
          loader.style.transition = "opacity 0.5s ease";
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>
  </body>
</html>
